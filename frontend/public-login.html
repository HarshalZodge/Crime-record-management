<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Complaint Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9fafb;
    --surface: #ffffff;
    --border: #e5e7eb;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --text: #1f2937;
    --text-light: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
  body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  
  .container {
    background: var(--surface);
    width: 100%; max-width: 400px;
    padding: 2.5rem;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    border: 1px solid var(--border);
  }
  .header { text-align: center; margin-bottom: 2rem; }
  .logo { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
  h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); }
  p { font-size: 0.875rem; color: var(--text-light); margin-top: 0.25rem; }

  .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .tab { flex: 1; text-align: center; padding: 0.75rem; font-weight: 600; font-size: 0.875rem; color: var(--text-light); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text); }
  input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 6px; outline: none; transition: 0.2s; font-size: 0.95rem; }
  input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

  button { width: 100%; padding: 0.875rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.2s; }
  button:hover { background: var(--primary-hover); }

  .error { color: #dc2626; font-size: 0.875rem; margin-top: 1rem; text-align: center; display: none; }
  
  #register-form { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">🏛️</div>
    <h1>Citizen Portal</h1>
    <p>File and track official police complaints</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')" id="tab-login">Login</div>
    <div class="tab" onclick="switchTab('register')" id="tab-register">Register</div>
  </div>

  <!-- LOGIN FORM -->
  <form id="login-form">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" required placeholder="••••••••">
    </div>
    <button type="submit">Sign In to Portal</button>
  </form>

  <!-- REGISTER FORM -->
  <form id="register-form">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg-name" required placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="reg-email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Create Password</label>
      <input type="password" id="reg-password" required placeholder="Min 6 characters">
    </div>
    <button type="submit">Create Account</button>
  </form>

  <div class="error" id="error-msg"></div>
</div>

<script>
  const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:5000'
    : 'https://crime-record-management-80an.onrender.com';

  function switchTab(tab) {
    document.getElementById('error-msg').style.display = 'none';
    if (tab === 'login') {
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('tab-login').classList.add('active');
      document.getElementById('tab-register').classList.remove('active');
    } else {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
      document.getElementById('tab-login').classList.remove('active');
      document.getElementById('tab-register').classList.add('active');
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // --- LOGIN LOGIC ---
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Authenticating...';
    try {
      const res = await fetch(API_BASE + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        if (data.user.role !== 'citizen') {
            showError('This portal is only for citizens. Officers must use the main dashboard.');
            btn.textContent = 'Sign In to Portal';
            return;
        }
        localStorage.setItem('crms_public_token', data.token);
        localStorage.setItem('crms_public_user', JSON.stringify(data.user));
        window.location.href = 'public.html';
      } else {
        showError(data.message);
        btn.textContent = 'Sign In to Portal';
      }
    } catch (err) {
      showError('Network error. Try again.');
      btn.textContent = 'Sign In to Portal';
    }
  });

  // --- REGISTER LOGIC ---
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Creating Account...';
    try {
      const res = await fetch(API_BASE + '/api/auth/register-citizen', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('reg-name').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('crms_public_token', data.token);
        localStorage.setItem('crms_public_user', JSON.stringify(data.user));
        window.location.href = 'public.html';
      } else {
        showError(data.message);
        btn.textContent = 'Create Account';
      }
    } catch (err) {
      showError('Network error. Try again.');
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
