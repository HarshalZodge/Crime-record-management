<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Dashboard — My Complaints</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9fafb; --surface: #ffffff; --border: #e5e7eb;
    --primary: #2563eb; --primary-hover: #1d4ed8;
    --text: #1f2937; --text-light: #6b7280;
    --status-pending: #f59e0b; --status-investigation: #3b82f6; --status-resolved: #10b981;
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
  body { background: var(--bg); color: var(--text); padding-bottom: 50px; }

  /* Navbar */
  .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 5%; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { font-size: 1.25rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }
  .user-info { display: flex; align-items: center; gap: 15px; font-size: 0.9rem; }
  .logout-btn { background: none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; color: var(--text-light); transition: 0.2s; }
  .logout-btn:hover { background: #f3f4f6; color: var(--text); }

  /* Main Container */
  .container { max-width: 1000px; margin: 2rem auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }

  /* Card Styles */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
  .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }

  /* Form */
  .form-group { margin-bottom: 15px; }
  label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 5px; color: var(--text); }
  input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; outline: none; transition: 0.2s; font-size: 0.95rem; }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  textarea { resize: vertical; min-height: 100px; }
  button.submit-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  button.submit-btn:hover { background: var(--primary-hover); }

  /* Complaints List */
  .complaint-item { border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
  .c-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .c-title { font-weight: 600; font-size: 1rem; }
  .c-date { font-size: 0.8rem; color: var(--text-light); }
  .c-desc { font-size: 0.9rem; color: var(--text-light); line-height: 1.4; margin-bottom: 12px; }
  
  .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .status-Pending { background: #fef3c7; color: #b45309; }
  .status-Investigation { background: #dbeafe; color: #1e40af; }
  .status-Resolved { background: #d1fae5; color: #065f46; }

  @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">🏛️ Citizen Portal</div>
  <div class="user-info">
    <span id="user-name">Loading...</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  
  <!-- File Complaint Area -->
  <div class="card">
    <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
      <span>📝 File a New Complaint</span>
      <div style="display:flex; gap:10px;">
        <button id="btn-manual" onclick="toggleForm('manual')" style="font-size:0.8rem; padding:4px 8px; border-radius:4px; border:1px solid var(--primary); background:var(--primary); color:#fff; cursor:pointer;">Manual Entry</button>
        <button id="btn-ai" onclick="toggleForm('ai')" style="font-size:0.8rem; padding:4px 8px; border-radius:4px; border:1px solid #9ca3af; background:#fff; color:#4b5563; cursor:pointer;">🤖 AI Chat Assistant</button>
      </div>
    </div>
    
    <!-- Manual Form -->
    <form id="complaint-form">
      <div class="form-group">
        <label>Subject / Incident Type</label>
        <input type="text" id="c-subject" placeholder="e.g., Stolen Bicycle, Noise Disturbance" required>
      </div>
      <div class="form-group">
        <label>Contact Number</label>
        <input type="tel" id="c-contact" placeholder="+1234567890" required>
      </div>
      <div class="form-group">
        <label>Date of Incident</label>
        <input type="date" id="c-date" required>
      </div>
      <div class="form-group">
        <label>Exact Location</label>
        <input type="text" id="c-location" placeholder="Street address or landmark" required>
      </div>
      <div class="form-group">
        <label>Detailed Description</label>
        <textarea id="c-desc" placeholder="Please describe exactly what happened..." required></textarea>
      </div>
      <button type="submit" class="submit-btn" id="submit-btn">Submit Official Complaint</button>
    </form>

    <!-- AI Chat Interface -->
    <div id="ai-chat-interface" style="display:none; height: 400px; display:flex; flex-direction:column; border:1px solid var(--border); border-radius:6px; overflow:hidden;">
      <div id="chat-messages" style="flex:1; overflow-y:auto; padding:15px; background:#f3f4f6; display:flex; flex-direction:column; gap:10px;">
        <div style="align-self:flex-start; background:var(--surface); padding:10px 14px; border-radius:12px; border:1px solid var(--border); max-width:85%; font-size:0.9rem;">
          <strong>🤖 AI Investigator:</strong><br>Hello, I'm the automated intake assistant. To speed things up, I can record your complaint manually. What seems to be the emergency today?
        </div>
      </div>
      <div style="display:flex; border-top:1px solid var(--border); background:var(--surface); padding:10px;">
        <input type="text" id="chat-input" placeholder="Type your response here..." style="flex:1; border:none; outline:none; background:transparent; font-size:0.95rem;">
        <button onclick="sendChatMessage()" style="background:var(--primary); color:white; padding:8px 16px; border:none; border-radius:4px; cursor:pointer; font-weight:600;">Send</button>
      </div>
    </div>
  </div>

  <!-- My Complaints List -->
  <div class="card">
    <div class="card-title">🕒 My Filed Complaints</div>
    <div id="complaints-list">
      <div style="color:var(--text-light); font-size:0.9rem;">Loading your complaints...</div>
    </div>
  </div>

</div>

<script>
  const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:5000'
    : 'https://crime-record-management-80an.onrender.com';

  const token = localStorage.getItem('crms_public_token');
  let user = null;
  try { user = JSON.parse(localStorage.getItem('crms_public_user')); } catch(e){}

  if (!token || !user || user.role !== 'citizen') {
    window.location.href = 'public-login.html';
  }

  document.getElementById('user-name').textContent = user.name;

  function logout() {
    localStorage.removeItem('crms_public_token');
    localStorage.removeItem('crms_public_user');
    window.location.href = 'public-login.html';
  }

  function authHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    };
  }

  // Fetch Complaints
  async function loadComplaints() {
    try {
      const res = await fetch(API_BASE + '/api/complaints/me', { headers: authHeaders() });
      if (res.status === 401) return logout();
      const data = await res.json();
      
      const list = document.getElementById('complaints-list');
      list.innerHTML = '';
      
      if (data.length === 0) {
        list.innerHTML = '<div style="color:var(--text-light); font-size:0.9rem;">You have not filed any complaints yet.</div>';
        return;
      }

      data.forEach(c => {
        const d = new Date(c.incidentDate).toLocaleDateString();
        let sClass = 'status-Pending';
        if (c.status.includes('Investigation')) sClass = 'status-Investigation';
        if (c.status.includes('Resolved') || c.status.includes('FIR')) sClass = 'status-Resolved';

        list.innerHTML += `
          <div class="complaint-item">
            <div class="c-header">
              <div class="c-title">${c.subject}</div>
              <div class="c-date">${d}</div>
            </div>
            <div class="c-desc">${c.description}</div>
            <div class="c-footer">
              <span class="status-badge ${sClass}">${c.status}</span>
            </div>
          </div>
        `;
      });
    } catch (err) {
      document.getElementById('complaints-list').innerHTML = '<div style="color:red; font-size:0.9rem;">Failed to load complaints.</div>';
    }
  }

  // Submit Complaint
  document.getElementById('complaint-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Submitting...';
    btn.disabled = true;

    const payload = {
      subject: document.getElementById('c-subject').value,
      contactNo: document.getElementById('c-contact').value,
      incidentDate: document.getElementById('c-date').value,
      location: document.getElementById('c-location').value,
      description: document.getElementById('c-desc').value
    };

    try {
      const res = await fetch(API_BASE + '/api/complaints', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        document.getElementById('complaint-form').reset();
        await loadComplaints();
        alert('Your complaint has been successfully filed and sent to the police.');
      } else {
        alert('Failed to submit complaint. Please try again.');
      }
    } catch (err) {
      alert('Network error. Failed to submit.');
    }
    btn.textContent = 'Submit Official Complaint';
    btn.disabled = false;
  });

  // Tab Toggling
  function toggleForm(type) {
    const manualForm = document.getElementById('complaint-form');
    const aiForm = document.getElementById('ai-chat-interface');
    const btnManual = document.getElementById('btn-manual');
    const btnAi = document.getElementById('btn-ai');

    if (type === 'manual') {
      manualForm.style.display = 'block'; aiForm.style.display = 'none';
      btnManual.style.background = 'var(--primary)'; btnManual.style.color = '#fff';
      btnAi.style.background = '#fff'; btnAi.style.color = '#4b5563';
    } else {
      manualForm.style.display = 'none'; aiForm.style.display = 'flex';
      btnAi.style.background = 'var(--primary)'; btnAi.style.color = '#fff';
      btnManual.style.background = '#fff'; btnManual.style.color = '#4b5563';
    }
  }

  // AI Chat Logic
  let chatHistory = [];
  
  function addMessageToUI(sender, text) {
    const list = document.getElementById('chat-messages');
    const align = sender === 'user' ? 'flex-end' : 'flex-start';
    const bg = sender === 'user' ? 'var(--primary)' : 'var(--surface)';
    const color = sender === 'user' ? '#fff' : 'var(--text)';
    const name = sender === 'user' ? '👤 You' : '🤖 AI Investigator';
    
    list.innerHTML += `
      <div style="align-self:${align}; background:${bg}; color:${color}; padding:10px 14px; border-radius:12px; border:1px solid var(--border); max-width:85%; font-size:0.9rem;">
        <strong>${name}:</strong><br>${text}
      </div>
    `;
    list.scrollTop = list.scrollHeight;
  }

  async function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    addMessageToUI('user', text);

    try {
      const res = await fetch(API_BASE + '/api/ai/investigator', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ history: chatHistory, message: text })
      });
      const data = await res.json();
      
      // Update history arrays
      chatHistory.push({ role: 'user', text: text });
      chatHistory.push({ role: 'model', text: data.reply });

      addMessageToUI('ai', data.reply);

      if (data.status === 'COMPLETE') {
        autoFileComplaint(data.extractedData);
      }
    } catch (err) {
      addMessageToUI('ai', '⚠️ Connection error. Please try again or use the manual form.');
    }
  }

  async function autoFileComplaint(extractedData) {
    addMessageToUI('ai', '<em>Filing your official police record now... please wait.</em>');
    try {
      const res = await fetch(API_BASE + '/api/complaints', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify(extractedData)
      });
      if (res.ok) {
        await loadComplaints();
        addMessageToUI('ai', '✅ Success! Your complaint has been formally filed and is visible on your dashboard below.');
        chatHistory = []; // Reset
      } else {
        addMessageToUI('ai', '❌ Failed to connect to the database. Please try the manual form.');
      }
    } catch (err) {
      addMessageToUI('ai', '❌ Network error when filing.');
    }
  }

  // Initial Load
  loadComplaints();
</script>
</body>
</html>
